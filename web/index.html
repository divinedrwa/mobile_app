<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Divine Society Management — maintenance, visitors, and everyday society tools">
  <meta name="theme-color" content="#3D8361">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GatePass+">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-apple-touch-180.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>GatePass+</title>
  <link rel="manifest" href="manifest.json">

  <!-- Razorpay Checkout.js -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <!-- Loading spinner while Flutter engine loads -->
  <style>
    body {
      margin: 0;
      background-color: #FFFFFF;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #3D8361;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #E8F0ED;
      border-top: 4px solid #3D8361;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text {
      margin-top: 16px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0.8;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading" class="loading-container">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading...</div>
  </div>

  <script>
    // Remove loading spinner once Flutter is ready
    window.addEventListener('flutter-first-frame', function () {
      var loading = document.getElementById('loading');
      if (loading) loading.remove();
    });
  </script>
  <script>
    // Register Firebase Messaging service worker for background push.
    // Uses relative URL so it resolves correctly regardless of --base-href.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('firebase-messaging-sw.js')
          .then(function (registration) {
            console.log('FCM SW registered, scope:', registration.scope);
          })
          .catch(function (err) {
            console.warn('FCM SW registration failed:', err);
          });
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
