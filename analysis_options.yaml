# Static analysis config for divine_app. Surfaced by `flutter analyze` and
# Dart-enabled IDEs.
#
# We layer on top of `flutter_lints` (the Flutter team's recommended set)
# and enable a handful of high-signal rules that catch common Flutter
# mistakes — left-on print() statements, missing await, unnecessary new/this,
# etc. Suppress per-line with `// ignore: name_of_lint` if a rule fires on
# legitimate code; do not disable wholesale here unless it's project-wide.

include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"

linter:
  rules:
    # Catches `print()` slips (use `logger` / `debugPrint` instead in this
    # codebase). Releases must not log to stdout.
    avoid_print: true
    # Pre-empts the "fire-and-forget Future" footgun that has bitten
    # auth/push flows in this repo.
    unawaited_futures: true
    # Performance hygiene that's free with hot-reload feedback.
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
    prefer_const_declarations: true
    # Dart style.
    prefer_single_quotes: true
    sort_child_properties_last: true
