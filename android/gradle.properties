org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Required for Google Play's 16 KB memory page-size requirement (effective
# 31 May 2026 for apps targeting Android 15+). Tells Bundletool / Play to
# package native libraries uncompressed inside the APK split so the OS can
# memory-map them directly at 16 KB-aligned offsets. AGP 8.x already does
# this by default; setting the flag explicitly prevents an older plugin or
# manifest tag from flipping it off via merger.
# See: https://developer.android.com/guide/practices/page-sizes
android.bundle.enableUncompressedNativeLibs=true
